services:
  db:
    build: .
    container_name: postgres_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  python_app:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: python_worker
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db